providers:
  - cursor
  - claude-code
options:
  toolExposure: on-demand
  requiresCommands:
    - cli: docker
      description: Required to run ODK containerised tools
    - cli: node
      description: Required to run capa and ODK scripts
    - cli: semlocal
      description: Required for local semantic memory (npm install -g semlocal)
skills:
  - id: capabilities-manager
    type: github
    def:
      repo: infragate/capa@capabilities-manager
      description: Guide for managing capabilities with capa CLI
      requires:
        - capa_install
        - find_skills
  - id: ontology-editor
    type: local
    def:
      path: ./skills/ontology-editor
      description: OWL-MCP tools for ontology editing (axioms, prefixes, config)
      requires:
        - '@owl.add_axiom'
        - '@owl.add_axioms'
        - '@owl.remove_axiom'
        - '@owl.find_axioms'
        - '@owl.get_all_axioms'
        - '@owl.add_prefix'
        - '@owl.ontology_metadata'
        - '@owl.get_labels_for_iri'
        - '@owl.add_axiom_by_name'
        - '@owl.remove_axiom_by_name'
        - '@owl.find_axioms_by_name'
        - '@owl.add_prefix_by_name'
        - '@owl.get_labels_for_iri_by_name'
        - '@owl.list_configured_ontologies'
        - '@owl.get_ontology_config'
        - '@owl.configure_ontology'
        - '@owl.remove_ontology_config'
        - '@owl.register_ontology_in_config'
        - '@owl.load_and_register_ontology'
  - id: odk-run
    type: local
    def:
      path: ./skills/odk-run
      description: >-
        Run custom Make targets or other ODK tools (Konclude, jena,
        relation-graph, etc.) not covered by dedicated skills
      requires:
        - odk_run
  - id: odk-owltools
    type: local
    def:
      path: ./skills/odk-owltools
      description: Run owltools for reasoning, merge, extract, OWL API operations
      requires:
        - odk_owltools
  - id: odk-dosdp-tools
    type: local
    def:
      path: ./skills/odk-dosdp-tools
      description: Run dosdp-tools for pattern-based ontology generation
      requires:
        - odk_dosdp_tools
  - id: odk-fastobo-validator
    type: local
    def:
      path: ./skills/odk-fastobo-validator
      description: Validate OBO-format files
      requires:
        - odk_fastobo_validator
  - id: odk-riot
    type: local
    def:
      path: ./skills/odk-riot
      description: Convert or validate RDF with riot
      requires:
        - odk_riot
  - id: odk-sparql
    type: local
    def:
      path: ./skills/odk-sparql
      description: Run SPARQL queries over ontologies
      requires:
        - odk_sparql
  - id: odk-runoak
    type: local
    def:
      path: ./skills/odk-runoak
      description: Query ontologies with OAKLIB (runoak)
      requires:
        - odk_runoak
  - id: odk-sssom
    type: local
    def:
      path: ./skills/odk-sssom
      description: Work with SSSOM mapping files (validate, convert, merge)
      requires:
        - odk_sssom
  - id: odk-seed
    type: local
    def:
      path: ./skills/odk-seed
      description: Seed a new ODK ontology repo from a config YAML
      requires:
        - odk_seed
  - id: odk-robot
    type: local
    def:
      path: ./skills/odk-robot
      description: >-
        Run ROBOT in ODK Docker (verify, merge, reason, convert, template,
        query)
      requires:
        - odk_robot
  - id: odk-make
    type: local
    def:
      path: ./skills/odk-make
      description: >-
        Run ODK Make targets (test, prepare_release, refresh-imports,
        update_repo)
      requires:
        - odk_make
  - id: semlocal
    type: remote
    def:
      url: https://raw.githubusercontent.com/Minitour/semlocal/refs/heads/main/skills/semlocal/SKILL.md
      description: >-
        Store, search, and delete text using local semantic search (semlocal CLI).
        Use for long-term memory, knowledge extraction, and recall across sessions.
      requires: []
  - id: analyze-project
    type: local
    def:
      path: ./skills/analyze-project
      description: >-
        Understand a target ontology repo (structure, CONTRIBUTING, issue/PR
        conventions). Use when user wants to analyze a repo or learn how to
        contribute.
  - id: clone-project
    type: local
    def:
      path: ./skills/clone-project
      description: >-
        Clone an ontology repo into projects/<slug>/; all later work is done
        from that directory. Use when user wants to clone or set up a repo
        locally.
  - id: review-issue
    type: local
    def:
      path: ./skills/review-issue
      description: >-
        Summarize and triage ontology repo issues (NTR, synonym, etc.).
        Use when user wants to review an issue or find good first issues.
  - id: create-pull-request
    type: local
    def:
      path: ./skills/create-pull-request
      description: >-
        From project directory, create branch, commit, push, and open PR.
        Use when user wants to create a PR for their changes or for an issue.
  - id: skill-creator
    type: github
    def:
      repo: anthropics/skills@skill-creator
agents:
  base:
    type: local
    path: ./INIT.md
  additional:
    - type: inline
      id: capa_tool_usage
      content: >-
        After learning a new skill, call the `setup_tools` tool to activate it,
        then use `call_tool` to invoke the relevant tool.
    - type: inline
      id: ontology_builder_tools
      content: >-
        For ontology work: edit OWL only via the ontology-editor tools (never by
        hand); run ROBOT (reason, verify, merge, etc.) via the odk_robot tool;
        run ODK Make targets via odk_make. Paths for ODK tools are relative to the mounted project root
        (e.g. ontology/agentic-ai.owl).
    - type: inline
      id: external_ontology_contribution
      content: >-
        For contributing to an external ontology, use analyze-project, then
        clone-project (into projects/), then review-issue, then implement using
        odk_robot and odk_make with project_dir (and make_path for Make), then
        create-pull-request. Do not run the ODK Docker script manually for
        clones. Follow the target repo's CONTRIBUTING and PR checklist.
servers:
  # Minitour/owl-mcp (Rust): https://github.com/Minitour/owl-mcp
  - id: owl
    type: mcp
    description: OWL ontology editing via MCP (find/add/remove axioms, OWL functional syntax)
    def:
      cmd: npx
      args:
        - -y
        - owl-mcp@1.0.5
tools:
  - id: capa_install
    type: command
    def:
      run:
        cmd: capa install
        args: []
  - id: find_skills
    type: command
    def:
      init:
        cmd: npx skills@latest
      run:
        cmd: npx skills find {query}
        args:
          - name: query
            type: string
            description: Search query for finding skills
            required: true
  - id: add_axiom
    type: mcp
    description: Add one axiom to an OWL file (functional syntax)
    def:
      server: '@owl'
      tool: add_axiom
  - id: add_axioms
    type: mcp
    description: Add multiple axioms to an OWL file
    def:
      server: '@owl'
      tool: add_axioms
  - id: remove_axiom
    type: mcp
    description: Remove one axiom from an OWL file
    def:
      server: '@owl'
      tool: remove_axiom
  - id: find_axioms
    type: mcp
    description: Find axioms matching a pattern in an OWL file
    def:
      server: '@owl'
      tool: find_axioms
  - id: get_all_axioms
    type: mcp
    description: Get all axioms from an OWL file
    def:
      server: '@owl'
      tool: get_all_axioms
  - id: add_prefix
    type: mcp
    description: Add a prefix mapping to an OWL file
    def:
      server: '@owl'
      tool: add_prefix
  - id: ontology_metadata
    type: mcp
    description: Get ontology metadata/annotations
    def:
      server: '@owl'
      tool: ontology_metadata
  - id: get_labels_for_iri
    type: mcp
    description: Get labels for an IRI in an OWL file
    def:
      server: '@owl'
      tool: get_labels_for_iri
  - id: add_axiom_by_name
    type: mcp
    description: Add axiom to a configured ontology by name
    def:
      server: '@owl'
      tool: add_axiom_by_name
  - id: remove_axiom_by_name
    type: mcp
    description: Remove axiom from a configured ontology by name
    def:
      server: '@owl'
      tool: remove_axiom_by_name
  - id: find_axioms_by_name
    type: mcp
    description: Find axioms in a configured ontology by name
    def:
      server: '@owl'
      tool: find_axioms_by_name
  - id: add_prefix_by_name
    type: mcp
    description: Add prefix to a configured ontology by name
    def:
      server: '@owl'
      tool: add_prefix_by_name
  - id: get_labels_for_iri_by_name
    type: mcp
    description: Get labels for an IRI in a configured ontology by name
    def:
      server: '@owl'
      tool: get_labels_for_iri_by_name
  - id: list_configured_ontologies
    type: mcp
    description: List all configured ontologies
    def:
      server: '@owl'
      tool: list_configured_ontologies
  - id: get_ontology_config
    type: mcp
    description: Get configuration for one ontology by name
    def:
      server: '@owl'
      tool: get_ontology_config
  - id: configure_ontology
    type: mcp
    description: Add or update an ontology in config
    def:
      server: '@owl'
      tool: configure_ontology
  - id: remove_ontology_config
    type: mcp
    description: Remove an ontology from config
    def:
      server: '@owl'
      tool: remove_ontology_config
  - id: register_ontology_in_config
    type: mcp
    description: Register an already-loaded ontology in config
    def:
      server: '@owl'
      tool: register_ontology_in_config
  - id: load_and_register_ontology
    type: mcp
    description: Load an OWL file and register it in config (create if missing)
    def:
      server: '@owl'
      tool: load_and_register_ontology
  - id: odk_run
    type: command
    group: odk
    description: >-
      Run an arbitrary ODK command (custom make target or other tool not covered
      by dedicated tools). Optional project_dir mounts that dir at /work (e.g.
      projects/pizza). Paths in command are relative to repo root or project_dir.
    def:
      run:
        cmd: node scripts/odk-docker-run.js "{project_dir}" "{command}"
        args:
          - name: command
            type: string
            description: >-
              Full command (e.g. make -C ontology custom-target, Konclude -i
              edit.owl -o out.owl). No robot—use odk_robot.
            required: true
          - name: project_dir
            type: string
            description: >-
              Optional. Project root to mount (e.g. projects/pizza). Empty or
              omit to use current working directory.
            required: false
  - id: odk_owltools
    type: command
    group: odk
    description: Run owltools (reasoning, merge, extract, OWL API operations)
    def:
      run:
        cmd: node scripts/odk-docker-run.js "owltools {args}"
        args:
          - name: args
            type: string
            description: >-
              owltools arguments (e.g. edit.owl --reasoner elk --run-reasoner -o
              reasoned.owl)
            required: true
  - id: odk_dosdp_tools
    type: command
    group: odk
    description: Run dosdp-tools (pattern-based ontology generation from YAML + CSV)
    def:
      run:
        cmd: node scripts/odk-docker-run.js "dosdp-tools {args}"
        args:
          - name: args
            type: string
            description: >-
              dosdp-tools arguments (e.g. generate --template t.yaml --ontology
              edit.owl --outfile out.owl)
            required: true
  - id: odk_fastobo_validator
    type: command
    group: odk
    description: Validate OBO-format files (syntax and structure)
    def:
      run:
        cmd: node scripts/odk-docker-run.js "fastobo-validator {args}"
        args:
          - name: args
            type: string
            description: File path(s) to validate (e.g. edit.obo)
            required: true
  - id: odk_riot
    type: command
    group: odk
    description: Convert or validate RDF (RDF/XML, Turtle, N-Triples, JSON-LD)
    def:
      run:
        cmd: node scripts/odk-docker-run.js "riot {args}"
        args:
          - name: args
            type: string
            description: riot arguments (e.g. --output=ttl edit.owl)
            required: true
  - id: odk_sparql
    type: command
    group: odk
    description: Run SPARQL queries against RDF/ontology files
    def:
      run:
        cmd: node scripts/odk-docker-run.js "sparql {args}"
        args:
          - name: args
            type: string
            description: sparql arguments (e.g. --query query.rq --data edit.owl)
            required: true
  - id: odk_runoak
    type: command
    group: odk
    description: Query and navigate ontologies with OAKLIB (search, ancestors, descendants)
    def:
      run:
        cmd: node scripts/odk-docker-run.js "runoak {args}"
        args:
          - name: args
            type: string
            description: runoak arguments (e.g. -i edit.owl search "term")
            required: true
  - id: odk_sssom
    type: command
    group: odk
    description: Validate, convert, or merge SSSOM mapping files
    def:
      run:
        cmd: node scripts/odk-docker-run.js "sssom {args}"
        args:
          - name: args
            type: string
            description: sssom arguments (e.g. validate mappings.tsv)
            required: true
  - id: odk_seed
    type: command
    group: odk
    description: >-
      Seed a new ODK ontology repo from a config YAML, then copy the generated
      layout into the project directory (e.g. projects/<project_dir>/).
    def:
      run:
        cmd: node scripts/odk-seed-with-copy.js {config_path} {extra}
        args:
          - name: config_path
            type: string
            description: >-
              Path to the ODK config YAML relative to project root (e.g.
              projects/<project_dir>/<id>-odk.yaml)
            required: true
          - name: extra
            type: string
            description: >-
              Optional extra seed arguments (e.g. --commit-artefacts). Leave
              empty if not needed. Git identity is supplied.
            required: false
  - id: odk_robot
    type: command
    group: odk
    description: >-
      Run ROBOT inside ODK Docker (validate, merge, reason, convert, template,
      query). Paths relative to project root (or cwd when project_dir empty).
      Use project_dir for clones under projects/ (e.g. projects/owner-repo).
    def:
      run:
        cmd: node scripts/odk-docker-run.js "{project_dir}" "robot {robot_args}"
        args:
          - name: robot_args
            type: string
            description: >-
              ROBOT arguments; paths relative to mounted root (e.g. reason
              --input ontology/edit.owl or the edit file path in the project)
            required: true
          - name: project_dir
            type: string
            description: >-
              Optional. Project root to mount (e.g. projects/owner-repo for a
              clone). Empty or omit for workspace ontology (cwd).
            required: false
  - id: odk_make
    type: command
    group: odk
    description: >-
      Run Makefile target in an ODK repo (test, prepare_release, etc.). Use
      project_dir for clones under projects/; use make_path when Makefile is
      not in the ontology directory.
    def:
      run:
        cmd: node scripts/odk-docker-run.js "{project_dir}" "make -C {make_path} {target}"
        args:
          - name: target
            type: string
            description: >-
              Make target (e.g. test, prepare_release, refresh-imports,
              update_repo, odkversion)
            required: true
          - name: project_dir
            type: string
            description: >-
              Optional. Project root to mount (e.g. projects/owner-repo).
              Empty or omit for workspace ontology. Relative paths resolved from
              repo root.
            required: false
          - name: make_path
            type: string
            description: >-
              Path to Makefile directory relative to project root (e.g.
              ontology). Required; pass the path where the Makefile lives.
            required: true
